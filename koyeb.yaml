name: wax-prep-gateway
routes:
  - port: 8000
    path: /
health_checks:
  - port: 8000
    http:
      path: /health
ports:
  - port: 8000
    protocol: http
env:
  - name: ENVIRONMENT
    value: production
  - name: DATABASE_URL
    value: sqlite+aiosqlite:///./wax.db
  # Add your other env vars in the Koyeb dashboard
