# Deploy this as two services on Northflank:
# 1. Service: wax-gateway (web)
# 2. Service: wax-worker (worker)

apiVersion: v1
kind: Service
metadata:
  name: wax-gateway
spec:
  type: web
  build:
    dockerfile: Dockerfile
  ports:
    - port: 8000
      http: true
  env:
    - name: ENVIRONMENT
      value: production
  healthCheck:
    path: /health
    port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: wax-worker
spec:
  type: worker
  build:
    dockerfile: Dockerfile
  command: python -m app.worker
  env:
    - name: ENVIRONMENT
      value: production
